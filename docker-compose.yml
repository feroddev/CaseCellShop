services:
  postgres:
    image: postgres:17
    container_name: casecellshop-postgres
    environment:
      POSTGRES_USER: casecellshop
      POSTGRES_PASSWORD: casecellshop
      POSTGRES_DB: casecellshop
    ports:
      - "5432:5432"
    volumes:
      - casecellshop-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casecellshop -d casecellshop"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: casecellshop-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://casecellshop:casecellshop@postgres:5432/casecellshop?schema=public
      ERP_MIN_DELAY_MS: 800
      ERP_MAX_DELAY_MS: 2500
      ERP_FAILURE_RATE: 0.3
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  casecellshop-postgres-data:
